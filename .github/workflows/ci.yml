name: CI

# The green bar, enforced. Mirrors CONTRIBUTING.md: fmt + clippy(-D warnings) +
# test, plus a guard that no `unsafe` enters the kernel.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  green-bar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy (warnings are errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all

      - name: No unsafe in the kernel (Law III)
        run: |
          if grep -rnE '\bunsafe\b' crates/kernel/src \
               | grep -vE 'forbid\(unsafe_code\)|^\s*//|^\s*//!'; then
            echo "::error::unsafe found in crates/kernel — Law III forbids it"
            exit 1
          fi
          echo "no unsafe in kernel ✓"
